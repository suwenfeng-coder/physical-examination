<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>预约详情</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><aside th:replace="~{fragments/layout :: sidebar}"></aside><main class="main"><header th:replace="~{fragments/layout :: topbar('预约详情')}"></header><div th:replace="~{fragments/layout :: alerts}"></div>
<section class="order-summary"><div><span class="eyebrow">CHECKUP APPOINTMENT</span><h2 th:text="${appointment.appointmentNo}"></h2><p th:text="${appointment.type.label + ' · ' + appointment.checkupPackage.name + ' · ' + #temporals.format(appointment.appointmentDate, 'yyyy年MM月dd日')}"></p></div><div class="summary-actions"><span class="badge large" th:classappend="${'status-' + #strings.toLowerCase(appointment.status.name())}" th:text="${appointment.status.label}"></span></div></section>
<section class="info-grid"><div class="panel info-card"><span th:text="${appointment.type.name() == 'ORGANIZATION' ? '预约单位' : '预约人'}"></span><strong th:text="${appointment.type.name() == 'ORGANIZATION' ? appointment.organization.name : appointment.participants[0].patient.name}"></strong><p th:text="${appointment.type.name() == 'ORGANIZATION' ? appointment.organization.contactName + ' · ' + appointment.organization.contactPhone : appointment.participants[0].patient.phone}"></p></div><div class="panel info-card"><span>预约日期</span><strong th:text="${#temporals.format(appointment.appointmentDate, 'yyyy-MM-dd')}"></strong><p th:text="${appointment.doctor == null ? '暂未指定主检医生' : appointment.doctor.name + ' · ' + appointment.doctor.departmentName}"></p></div><div class="panel info-card"><span>参检规模</span><strong th:text="${appointment.participants.size() + ' 人'}"></strong><p th:text="${'套餐：' + appointment.checkupPackage.name}"></p></div></section>
<section class="panel" th:if="${appointment.type.name() == 'ORGANIZATION'}"><div class="panel-head wrap"><div><h3>单位参检人</h3><p>所有人员均关联受检人健康档案</p></div><div class="inline-actions" th:if="${appointment.status.name() != 'CANCELLED'}"><a class="btn" th:href="@{/appointments/organization/template}">↓ Excel 模板</a><form class="inline-import" th:action="@{/appointments/{id}/participants/import(id=${appointment.id})}" method="post" enctype="multipart/form-data"><input type="file" name="file" accept=".xlsx" required><button class="btn btn-primary">一键导入</button></form></div></div>
<div class="table-wrap"><table><thead><tr><th>姓名</th><th>性别</th><th>年龄</th><th>手机号</th><th>部门</th><th>工号</th><th>身份证号</th></tr></thead><tbody><tr th:each="item:${appointment.participants}"><td><b th:text="${item.patient.name}"></b></td><td th:text="${item.patient.gender.label}"></td><td th:text="${item.patient.age + ' 岁'}"></td><td th:text="${item.patient.phone}"></td><td th:text="${item.department == null ? '-' : item.department}"></td><td th:text="${item.employeeNo == null ? '-' : item.employeeNo}"></td><td th:text="${item.patient.idCard == null ? '-' : item.patient.idCard}"></td></tr><tr th:if="${#lists.isEmpty(appointment.participants)}"><td colspan="7" class="empty">尚未导入参检人，请下载模板填写后导入</td></tr></tbody></table></div></section>
<section class="panel" th:if="${appointment.type.name() == 'ORGANIZATION'}"><div class="panel-head"><div><h3>单位资料</h3><p>本次预约关联的单位联系信息</p></div></div><div class="detail-list"><div><span>单位名称</span><b th:text="${appointment.organization.name}"></b></div><div><span>信用代码</span><b th:text="${appointment.organization.creditCode == null ? '-' : appointment.organization.creditCode}"></b></div><div><span>联系人</span><b th:text="${appointment.organization.contactName}"></b></div><div><span>联系电话</span><b th:text="${appointment.organization.contactPhone}"></b></div><div class="span-2"><span>单位地址</span><b th:text="${appointment.organization.address == null ? '-' : appointment.organization.address}"></b></div></div></section>
<form class="danger-zone" th:if="${appointment.status.name() != 'CANCELLED'}" th:action="@{/appointments/{id}/cancel(id=${appointment.id})}" method="post" onsubmit="return confirm('确定取消该预约吗？')"><button class="text-danger">取消此预约</button></form>
</main></body></html>
