<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>体检预约</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><aside th:replace="~{fragments/layout :: sidebar}"></aside><main class="main"><header th:replace="~{fragments/layout :: topbar('体检预约')}"></header><div th:replace="~{fragments/layout :: alerts}"></div>
<section class="appointment-choice">
<a class="choice-card" th:href="@{/appointments/new/personal}"><span class="choice-icon">♙</span><div><b>个人体检预约</b><small>为单个受检人选择套餐和体检日期</small></div></a>
<a class="choice-card organization" th:href="@{/appointments/new/organization}"><span class="choice-icon">▦</span><div><b>单位体检预约</b><small>录入单位信息，并通过 Excel 批量导入参检人</small></div></a>
</section>
<section class="panel"><div class="panel-head wrap"><form class="search-form" method="get"><input name="keyword" th:value="${keyword}" placeholder="预约号、单位、姓名或手机号"><select name="type"><option value="">全部类型</option><option th:each="item:${types}" th:value="${item}" th:text="${item.label}" th:selected="${item == selectedType}"></option></select><select name="status"><option value="">全部状态</option><option th:each="item:${statuses}" th:value="${item}" th:text="${item.label}" th:selected="${item == selectedStatus}"></option></select><button class="btn">筛选</button></form></div>
<div class="table-wrap"><table><thead><tr><th>预约号</th><th>预约类型</th><th>预约主体</th><th>体检套餐</th><th>预约日期</th><th>人数</th><th>状态</th><th>操作</th></tr></thead><tbody>
<tr th:each="item:${appointments}"><td><a th:href="@{/appointments/{id}(id=${item.id})}" th:text="${item.appointmentNo}"></a></td><td><span class="type-tag" th:text="${item.type.label}"></span></td><td><b th:text="${item.type.name() == 'ORGANIZATION' ? item.organization.name : item.participants[0].patient.name}"></b><small class="table-note" th:text="${item.type.name() == 'ORGANIZATION' ? item.organization.contactName + ' · ' + item.organization.contactPhone : item.participants[0].patient.phone}"></small></td><td th:text="${item.checkupPackage.name}"></td><td th:text="${#temporals.format(item.appointmentDate, 'yyyy-MM-dd')}"></td><td th:text="${item.participants.size() + ' 人'}"></td><td><span class="badge" th:classappend="${'status-' + #strings.toLowerCase(item.status.name())}" th:text="${item.status.label}"></span></td><td><a class="text-link" th:href="@{/appointments/{id}(id=${item.id})}">查看</a></td></tr>
<tr th:if="${#lists.isEmpty(appointments)}"><td colspan="8" class="empty">暂无符合条件的预约记录</td></tr></tbody></table></div></section></main></body></html>
