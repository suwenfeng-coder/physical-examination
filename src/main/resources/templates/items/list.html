<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>检查项目</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><aside th:replace="~{fragments/layout :: sidebar}"></aside><main class="main"><header th:replace="~{fragments/layout :: topbar('检查项目')}"></header><div th:replace="~{fragments/layout :: alerts}"></div>
<section class="panel"><div class="panel-head"><div><h3>项目库</h3><p>套餐中的标准检查项目</p></div><a class="btn btn-primary" th:href="@{/items/new}">＋ 新增项目</a></div>
<div class="table-wrap"><table><thead><tr><th>项目名称</th><th>科室</th><th>参考范围</th><th>单位</th><th>价格</th><th>操作</th></tr></thead><tbody>
<tr th:each="i:${items}"><td><b th:text="${i.name}"></b><small class="table-note" th:text="${i.description}"></small></td><td th:text="${i.departmentName}"></td><td th:text="${#strings.isEmpty(i.referenceRange) ? '-' : i.referenceRange}"></td><td th:text="${#strings.isEmpty(i.unit) ? '-' : i.unit}"></td><td th:text="${'¥ ' + i.price}"></td><td><a class="text-link" th:href="@{/items/{id}/edit(id=${i.id})}">编辑</a></td></tr>
</tbody></table></div></section></main></body></html>
