<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>体检管理</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><aside th:replace="~{fragments/layout :: sidebar}"></aside><main class="main"><header th:replace="~{fragments/layout :: topbar('体检管理')}"></header><div th:replace="~{fragments/layout :: alerts}"></div>
<section class="panel"><div class="panel-head wrap"><form class="search-form" method="get"><input name="keyword" th:value="${keyword}" placeholder="单号、姓名或手机号"><select name="status"><option value="">全部状态</option><option th:each="s:${statuses}" th:value="${s}" th:text="${s.label}" th:selected="${s == selectedStatus}"></option></select><button class="btn">筛选</button></form><a class="btn btn-primary" th:href="@{/orders/new}">＋ 新建体检登记</a></div>
<div class="table-wrap"><table><thead><tr><th>体检单号</th><th>受检人</th><th>体检套餐</th><th>体检日期</th><th>主检医生</th><th>金额</th><th>状态</th><th>操作</th></tr></thead><tbody>
<tr th:each="o:${orders}"><td><a th:href="@{/orders/{id}(id=${o.id})}" th:text="${o.orderNo}"></a></td><td><b th:text="${o.patient.name}"></b><small class="table-note" th:text="${o.patient.phone}"></small></td><td th:text="${o.checkupPackage.name}"></td><td th:text="${#temporals.format(o.examDate, 'yyyy-MM-dd')}"></td><td th:text="${o.doctor == null ? '-' : o.doctor.name}"></td><td th:text="${'¥ ' + o.amount}"></td><td><span class="badge" th:classappend="${'status-' + #strings.toLowerCase(o.status.name())}" th:text="${o.status.label}"></span></td><td><a class="text-link" th:href="@{/orders/{id}(id=${o.id})}">查看</a></td></tr>
<tr th:if="${#lists.isEmpty(orders)}"><td colspan="8" class="empty">暂无符合条件的体检单</td></tr></tbody></table></div></section></main></body></html>
