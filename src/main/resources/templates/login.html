<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 安康体检管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-decoration one"></div>
<div class="login-decoration two"></div>
<main class="login-card">
    <div class="login-brand">
        <span class="brand-mark">✚</span>
        <div><h1>安康体检</h1><p>医院体检管理系统</p></div>
    </div>
    <div class="login-intro">
        <span class="eyebrow">WELCOME BACK</span>
        <h2>欢迎登录</h2>
        <p>高效、清晰地管理每一份健康档案</p>
    </div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/login}" method="post" class="stack-form">
        <label>用户名<input name="username" th:value="${username}" placeholder="请输入用户名" required autofocus></label>
        <label>密码<input type="password" name="password" placeholder="请输入密码" required></label>
        <button class="btn btn-primary btn-block" type="submit">登 录</button>
    </form>
    <p class="login-hint">默认账号：admin　密码：123456</p>
</main>
</body>
</html>
