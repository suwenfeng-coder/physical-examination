<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - 安康体检管理系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page">
<div class="login-decoration one"></div>
<div class="login-decoration two"></div>
<main class="login-card auth-card">
    <div class="login-brand">
        <span class="brand-mark">✚</span>
        <div><h1>安康体检</h1><p>医院体检管理系统</p></div>
    </div>
    <div class="login-intro">
        <span class="eyebrow">WELCOME BACK</span>
        <h2>欢迎登录</h2>
        <p>安全访问您的健康管理工作台</p>
    </div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>
    <div class="alert error" th:if="${error}" th:text="${error}"></div>

    <div class="auth-tabs">
        <a th:href="@{/login(mode='password')}" th:classappend="${mode != 'sms'} ? 'active'">密码登录</a>
        <a th:href="@{/login(mode='sms')}" th:classappend="${mode == 'sms'} ? 'active'">验证码登录</a>
    </div>

    <form th:if="${mode != 'sms'}" th:action="@{/login}" method="post" class="stack-form">
        <input type="hidden" name="mode" value="password">
        <label>用户名或手机号
            <input name="identifier" th:value="${identifier}" placeholder="请输入用户名或手机号" required autofocus>
        </label>
        <label>密码
            <input type="password" name="password" placeholder="请输入密码" required>
        </label>
        <button class="btn btn-primary btn-block" type="submit">登 录</button>
    </form>

    <form th:if="${mode == 'sms'}" th:action="@{/login}" method="post" class="stack-form sms-form">
        <input type="hidden" name="mode" value="sms">
        <label>手机号码
            <input id="loginPhone" name="phone" th:value="${phone}" placeholder="请输入已注册手机号"
                   pattern="1\d{10}" maxlength="11" required autofocus>
        </label>
        <label>短信验证码
            <span class="code-input">
                <input name="verificationCode" placeholder="请输入6位验证码"
                       inputmode="numeric" pattern="\d{6}" maxlength="6" required>
                <button type="button" class="send-code" data-phone="#loginPhone" data-purpose="LOGIN">获取验证码</button>
            </span>
        </label>
        <div class="sms-message" aria-live="polite"></div>
        <button class="btn btn-primary btn-block" type="submit">验证码登录</button>
    </form>

    <div class="auth-footer">
        <span>还没有账户？</span><a th:href="@{/register}">立即注册</a>
    </div>
    <p class="login-hint">管理员默认账号：admin　密码：123456</p>
</main>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
