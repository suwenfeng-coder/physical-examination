<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>受检人管理</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><aside th:replace="~{fragments/layout :: sidebar}"></aside><main class="main">
<header th:replace="~{fragments/layout :: topbar('受检人管理')}"></header><div th:replace="~{fragments/layout :: alerts}"></div>
<section class="panel">
    <div class="panel-head">
        <form class="search-form" method="get"><input name="keyword" th:value="${keyword}" placeholder="搜索姓名或手机号"><button class="btn">搜索</button></form>
        <a class="btn btn-primary" th:href="@{/patients/new}">＋ 新增受检人</a>
    </div>
    <div class="table-wrap"><table><thead><tr><th>姓名</th><th>性别</th><th>年龄</th><th>手机号</th><th>身份证号</th><th>建档时间</th><th>操作</th></tr></thead>
        <tbody><tr th:each="p : ${patients}"><td><b th:text="${p.name}"></b></td><td th:text="${p.gender.label}"></td><td th:text="${p.age + ' 岁'}"></td><td th:text="${p.phone}"></td><td th:text="${#strings.isEmpty(p.idCard) ? '-' : p.idCard}"></td><td th:text="${#temporals.format(p.createdAt, 'yyyy-MM-dd')}"></td><td><a class="text-link" th:href="@{/patients/{id}/edit(id=${p.id})}">编辑</a></td></tr>
        <tr th:if="${#lists.isEmpty(patients)}"><td colspan="7" class="empty">没有找到受检人</td></tr></tbody></table></div>
</section></main></body></html>
