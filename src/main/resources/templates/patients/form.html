<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>受检人信息</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body><aside th:replace="~{fragments/layout :: sidebar}"></aside><main class="main">
<header th:replace="~{fragments/layout :: topbar(${patient.id == null ? '新增受检人' : '编辑受检人'})}"></header>
<section class="panel form-panel"><form th:action="@{/patients/save}" th:object="${patient}" method="post">
    <input type="hidden" th:field="*{id}">
    <div class="form-section"><h3>基本信息</h3><div class="form-grid">
        <label>姓名 <em>*</em><input th:field="*{name}" placeholder="请输入姓名"><small class="field-error" th:errors="*{name}"></small></label>
        <label>性别 <em>*</em><select th:field="*{gender}"><option value="">请选择</option><option th:each="g:${genders}" th:value="${g}" th:text="${g.label}"></option></select><small class="field-error" th:errors="*{gender}"></small></label>
        <label>出生日期 <em>*</em><input type="date" th:field="*{birthday}"><small class="field-error" th:errors="*{birthday}"></small></label>
        <label>手机号码 <em>*</em><input th:field="*{phone}" placeholder="11位手机号码"><small class="field-error" th:errors="*{phone}"></small></label>
        <label>身份证号<input th:field="*{idCard}" placeholder="选填"></label>
        <label>联系地址<input th:field="*{address}" placeholder="选填"></label>
    </div></div>
    <div class="form-section"><h3>健康信息</h3><label>既往病史<textarea th:field="*{medicalHistory}" rows="4" placeholder="高血压、糖尿病、过敏史等，无则留空"></textarea></label></div>
    <div class="form-actions"><a class="btn" th:href="@{/patients}">取消</a><button class="btn btn-primary">保存档案</button></div>
</form></section></main></body></html>
