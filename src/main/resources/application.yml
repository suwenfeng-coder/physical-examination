spring:
  application:
    name: physical-examination
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/physical_examination?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

server:
  port: ${SERVER_PORT:8080}

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:123456}
